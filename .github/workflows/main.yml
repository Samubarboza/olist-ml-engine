name: CI ML Project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t olist-ml-engine:ci .

    - name: Run churn pipeline
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/app \
          olist-ml-engine:ci \
          python -m src.pipelines.churn_pipeline

    - name: Execute notebooks
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/app \
          olist-ml-engine:ci \
          bash -c "jupyter nbconvert --to notebook --execute /app/notebooks/01_churn_prediction.ipynb --inplace --ExecutePreprocessor.timeout=600"

    - name: Upload reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ml-reports
        path: |
          reports/
          models/
